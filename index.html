<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="仕入れ自動入力">
  <meta name="theme-color" content="#2d5a27">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" href="/favicon.png">
  <title>仕入れ自動入力 | 八百屋アプリ</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --green: #2d5a27;
      --green-light: #4a8c42;
      --green-pale: #e8f5e2;
      --cream: #faf7f0;
      --white: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --border: #d4e8cc;
      --shadow: rgba(45, 90, 39, 0.12);
      --accent: #e8571a;
      --alert-pale: #ffeee8;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100dvh;
    }

    header {
      background: var(--green);
      padding: 16px 24px;
      padding-top: calc(16px + var(--safe-top));
      text-align: center;
      box-shadow: 0 2px 12px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-size: 18px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px 90px;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px var(--shadow);
    }

    .card-title {
      font-size: 16px;
      font-weight: 900;
      color: var(--green);
      margin-bottom: 14px;
      border-bottom: 2px solid var(--green-pale);
      padding-bottom: 8px;
    }

    /* ボタン類 */
    .btn {
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: block;
      width: 100%;
      text-align: center;
      touch-action: manipulation;
      margin-bottom: 15px;
    }

    .btn-primary {
      background: var(--green);
      color: var(--white);
    }

    .btn-primary:active {
      background: var(--green-light);
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .btn-accent {
      background: var(--accent);
      color: var(--white);
      margin-top: 25px;
    }

    .btn-accent:active {
      background: #c94510;
      transform: scale(0.98);
    }

    /* メッセージ表示部 */
    .msg {
      padding: 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 15px;
      display: none;
      line-height: 1.5;
      text-align: center;
    }

    .msg-error {
      background: var(--alert-pale);
      color: #c94510;
      border: 1px solid #f4c4b0;
    }

    .msg-success {
      background: var(--green-pale);
      color: var(--green);
      border: 1px solid var(--border);
    }

    /* 設定入力エリア */
    .settings-group {
      margin-bottom: 15px;
    }

    .settings-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .settings-group input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--cream);
      font-family: 'DM Mono', monospace;
    }

    .settings-group input:focus {
      outline: none;
      border-color: var(--green-light);
    }

    /* 読み取り結果リスト */
    #result-area {
      display: none;
    }

    .item-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      border-left: 6px solid var(--green);
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 900;
      font-size: 16px;
    }

    .price-info {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .calc-box {
      background: var(--green-pale);
      border-radius: 8px;
      padding: 12px;
    }

    .calc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .calc-row:last-child {
      margin-bottom: 0;
    }

    .count-input {
      width: 70px;
      padding: 8px;
      font-size: 16px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      text-align: center;
    }

    .sell-price {
      color: var(--accent);
      font-size: 18px;
      font-family: 'DM Mono', monospace;
    }

    .unit-price {
      font-family: 'DM Mono', monospace;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🥦 仕入れ自動入力</div>
  </header>
  <main>

    <div id="msg" class="msg"></div>

    <!-- ステップ1：カメラ -->
    <div class="card" id="step1-area">
      <div class="card-title">1. 伝票画像を読み込む</div>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">カメラで伝票を撮影するか、保存された写真を選ぶとAIが自動で内容を解読します。
      </p>

      <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="startUpload()">
      <button class="btn btn-primary" id="upload-btn" onclick="document.getElementById('file-input').click()">📷 カメラ起動 /
        写真を選択</button>
    </div>


    <!-- ステップ2：結果の確認と個数入力 -->
    <div id="result-area">
      <div class="card">
        <div class="card-title">2. 内容の確認と個数入力</div>
        <p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">
          「箱」の商品には個数を入力してください。利益30%上乗せの売値（10円切上）が自動計算されます。</p>

        <div id="items-container">
          <!-- Javascriptでここにアイテムが差し込まれます -->
        </div>

        <button class="btn btn-accent" id="save-btn" onclick="sendToGAS()">📊 スプレッドシートに保存</button>
        <button class="btn btn-primary" style="background:#aaa; margin-top:10px;" onclick="resetApp()">← やり直す</button>
      </div>
    </div>

  </main>

  <script>
    // ==========================================
    // ★ 管理者設定（裏の初期設定）★
    // ==========================================
    const SPREADSHEET_ID = '1HtvxKSP-zIAfH_5hsXJCAoShJJnC2Vgbmm7EjG9SgyE'; // ご指定のシートID
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBcYuCJIE4TEt4TFbIecRe5gSCK1D1MgXf_HkFo7-i324Cu3om02_5eLHYWDy20oo/exec';
    // ==========================================

    let currentItems = []; // 読み取ったデータ

    // カメラ・写真選択後の処理（GASに画像を投げてOCR結果をもらう）
    function startUpload() {
      const fileInput = document.getElementById('file-input');

      if (GAS_URL === 'YOUR_GAS_URL_HERE' || GAS_URL === '') {
        showMsg('エラー：ソースコード内の GAS_URL が設定されていません。', 'error');
        return;
      }
      if (fileInput.files.length === 0) return;

      const file = fileInput.files[0];
      const reader = new FileReader();

      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.innerText = '⏳ AIが伝票を解読しています... (約10〜15秒)';

      reader.onload = async function (e) {
        const base64Data = e.target.result.split(',')[1];

        try {
          // GASにPOSTリクエストを送る
          // ※fetch(GAS_URL) はリダイレクトとCORSの相性が悪いため、エラー時は詳細を表示
          const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'ocr',
              base64Image: base64Data,
              mimeType: file.type || 'image/jpeg'
            })
          });

          if (!response.ok) {
            throw new Error('サーバー側でエラーが発生しました。GASのデプロイ設定を確認してください。');
          }

          const data = await response.json();

          if (data.status === 'error') {
            throw new Error(data.message);
          }

          // 成功した場合
          currentItems = data.items || [];
          if (currentItems.length === 0) {
            throw new Error("画像から商品が見つかりませんでした。");
          }

          // 画面をステップ2（結果表示）へ切り替える
          document.getElementById('step1-area').style.display = 'none';
          document.getElementById('result-area').style.display = 'block';
          renderItems();

        } catch (err) {
          console.error(err);
          let errorMsg = '❌ エラーが発生しました。';
          if (err.message.includes('fetch')) {
            errorMsg = '❌ 通信エラー（CORS）: GASのURLが正しいか、公開設定が「全員」になっているか確認してください。';
          } else {
            errorMsg = '❌ エラー: ' + err.message;
          }
          showMsg(errorMsg, 'error');
        } finally {
          btn.disabled = false;
          btn.innerText = '📷 カメラ起動 / 写真を選択';
          fileInput.value = ''; // 次同じファイルが選べるようにクリア
        }
      };
      reader.readAsDataURL(file);
    }

    // 画面に読み取ったアイテムを描画する
    function renderItems() {
      const container = document.getElementById('items-container');
      container.innerHTML = '';

      currentItems.forEach((item, index) => {
        let calcHtml = '';

        // 箱なら個数入力欄を出す
        if (item.単位 === '箱') {
          calcHtml = `
          <div class="calc-box">
            <div class="calc-row">
              <label>この箱、何個入り？</label>
              <input type="number" class="count-input" id="count-${index}" placeholder="10" oninput="calcPrice(${index}, ${item.仕入価格})" inputmode="numeric">
            </div>
            <div class="calc-row">
              <span style="color:var(--text-muted); font-weight:normal;">1個あたり単価:</span>
              <span class="unit-price"><span id="unit-price-${index}">-</span> 円</span>
            </div>
            <div class="calc-row">
              <span style="color:var(--text-muted); font-weight:normal;">売値目安(30%益):</span>
              <span class="sell-price"><span id="sell-price-${index}">-</span> 円</span>
            </div>
          </div>
        `;
        } else {
          // バラやそれ以外は個数入力なしで、すぐに売価を表示
          const sell = Math.ceil((item.仕入価格 * 1.3) / 10) * 10;
          item.単価 = item.仕入価格;
          item.売値 = sell;
          calcHtml = `
          <div class="calc-box" style="background:var(--cream); border:1px solid #eee;">
            <div class="calc-row">
              <span style="color:var(--text-muted); font-weight:normal;">売値目安(30%益):</span>
              <span class="sell-price">${sell} 円</span>
            </div>
          </div>
        `;
        }

        container.innerHTML += `
        <div class="item-card">
          <div class="item-head">
            <span>${item.商品名}</span>
            <span>${item.仕入価格}円</span>
          </div>
          <div class="price-info">単位: ${item.単位}</div>
          ${calcHtml}
        </div>
      `;
      });
    }

    // 個数を入れた瞬間に単価と売値を再計算する
    function calcPrice(index, totalPrice) {
      const countInput = document.getElementById(`count-${index}`).value;
      const count = Number(countInput);

      if (count > 0) {
        const unitPrice = Math.floor(totalPrice / count); // 単価（切り捨て）
        const sellPrice = Math.ceil((unitPrice * 1.3) / 10) * 10; // 売値（1.3倍して10円切り上げ）

        document.getElementById(`unit-price-${index}`).innerText = unitPrice;
        document.getElementById(`sell-price-${index}`).innerText = sellPrice;

        // データ本体も更新
        currentItems[index].個数 = count;
        currentItems[index].単価 = unitPrice;
        currentItems[index].売値 = sellPrice;
      } else {
        document.getElementById(`unit-price-${index}`).innerText = '-';
        document.getElementById(`sell-price-${index}`).innerText = '-';
        currentItems[index].個数 = '';
      }
    }

    // 確定したデータをGAS(スプレッドシート)に保存する
    async function sendToGAS() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.innerText = '⏳ 保存中...';

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'save',
            sheetId: SPREADSHEET_ID,
            items: currentItems
          })
        });

        const data = await response.json();

        if (data.status === 'error') {
          throw new Error(data.message);
        }

        alert("✅ スプレッドシートに保存しました！");
        resetApp();

      } catch (err) {
        alert("保存エラー: " + err.message);
        btn.disabled = false;
        btn.innerText = '📊 スプレッドシートに保存（リトライ）';
      }
    }

    // 最初の画面に戻す
    function resetApp() {
      document.getElementById('step1-area').style.display = 'block';
      document.getElementById('result-area').style.display = 'none';
      const uploadBtn = document.getElementById('upload-btn');
      uploadBtn.disabled = false;
      uploadBtn.innerText = '📷 カメラ起動 / 写真を選択';

      const btnSave = document.getElementById('save-btn');
      btnSave.disabled = false;
      btnSave.innerText = '📊 スプレッドシートに保存';

      currentItems = [];
      document.getElementById('msg').style.display = 'none';
      window.scrollTo(0, 0);
    }

    // メッセージ表示UI
    function showMsg(text, type) {
      const msgDiv = document.getElementById('msg');
      msgDiv.innerText = text;
      msgDiv.className = type === 'success' ? 'msg msg-success' : 'msg msg-error';
      msgDiv.style.display = 'block';
      setTimeout(() => { msgDiv.style.display = 'none'; }, 6000);
    }

  </script>
</body>

</html>
